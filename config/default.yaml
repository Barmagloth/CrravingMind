agent:
  provider: anthropic  # "anthropic" | "cli" | "mock"
  model: claude-sonnet-4-6
  api_key: null  # uses ANTHROPIC_API_KEY env var
  # cli provider settings (used when provider: cli)
  cli_model: haiku  # claude model alias for the CLI (haiku / sonnet / opus)

phases:
  phase2_start: 11
  phase3_start: 26

budget:
  base_tokens: 10000
  circuit_breaker_pct: 0.15
  venture_decay: 0.5
  rnd_lambda: 0.0001
  rnd_max_pct: 0.30
  rnd_min_success_rate: 0.50
  critical_starvation_pct: 0.10

memory:
  bible_max_weight_pct: 0.20

sandbox:
  timeout_seconds: 5
  allowed_imports:
    - re
    - string
    - math
    - collections
    - itertools
    - functools
    - heapq
    - bisect
    - json
    - pathlib
    - io
    - textwrap
    - unicodedata
    - hashlib
    - difflib
    - struct

benchmark:
  frozen_ratio: 0.7
  target_ratio_min: 0.2
  target_ratio_max: 0.6
  tasks_per_epoch: 10
  n_questions: 10
  dynamic_ratio: 0.3

judge:
  # Scoring thresholds
  pass_threshold: 0.85
  task_score_weights:
    semantic: 0.5
    entity: 0.5

  # Compression tolerance
  ratio_tolerance: 1.05

  # Epoch success_rate aggregation
  epoch:
    epsilon: 0.01          # epsilon-smoothing for geometric mean
    type_weights: {}       # empty = equal weights per type

  # Combined success_rate
  dynamic_multiplier: 1.3  # weight boost for dynamic (holdout) scores

  # Dedup
  dedup:
    task_prefix_length: 500

  # Drift detection (CUSUM)
  drift:
    window: 10
    sigma_multiplier: 2.0

  # Embedding model
  embeddings:
    model_name: "sentence-transformers/all-MiniLM-L12-v2"

  # NER model
  entities:
    model_name: "en_core_web_lg"

  # LLM for benchmark QA (deterministic)
  llm:
    model: "claude-haiku-4-5-20251001"
    temperature: 0
    seed: 42

dashboard:
  enabled: false
  port: 8080
  update_interval_seconds: 2

scoring:
  pass_threshold: 0.85  # mirrors judge.pass_threshold

drift:
  window: 10
  sigma_multiplier: 2.0
  rnd_reset_on_drift: true

inheritance:
  enabled: false
  carry_graveyard: true
  carry_compress: true

logging:
  level: INFO

dedup:
  task_prefix_length: 500
  enabled: true
